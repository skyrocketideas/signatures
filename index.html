<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Signatures 5.0</title>
  </head>

  <body
    style="
      font-family: Arial, sans-serif;
      font-size: 12px;
      background-color: #f4f4f4;
      padding: 32px;
      margin: 0;
    "
  >
    <h1
      style="
        font-family: Arial, sans-serif;
        font-size: 24px;
        font-weight: bold;
        color: #000000;
      "
    >
      FKP Scorpio Entertainment Signatures
    </h1>

    <div id="signatures">Loading...</div>

    <!-- Load images.js -->
    <script src="images.js"></script>

    <script>
      // =========================================================
      // SOCIAL MEDIA
      // =========================================================

      const companySocials = [
        {
          url: "https://www.linkedin.com/company/awesome-company",
          icon: "linkedin",
          alt: "LinkedIn",
        },
        {
          url: "https://twitter.com/awesomecompany",
          icon: "twitter",
          alt: "Twitter",
        },
        {
          url: "https://facebook.com/awesomecompany",
          icon: "facebook",
          alt: "Facebook",
        },
        {
          url: "https://instagram.com/awesomecompany",
          icon: "instagram",
          alt: "Instagram",
        },
        {
          url: "https://youtube.com",
          icon: "youtube",
          alt: "YouTube",
        },
      ];

      // =========================================================
      // PARTNER DEFINITIONS
      // =========================================================

      const partnerDefinitions = {
        partner1_sq: {
          url: "https://fkpscorpioentertainment.com/events/detail/tutankhamun-the-immersive-exhibition/",
          alt: "Tutankhamun The Immersive Exhibition",
        },

        partner2_sq: {
          url: "https://fkpscorpioentertainment.com/events/detail/vikings-the-immersive-experience/",
          alt: "Vikings The Immersive Experience",
        },

        partner3_sq: {
          url: "https://fkpscorpioentertainment.com/events/detail/cleopatra-the-experience/",
          alt: "Cleopatra The Immersive Experience",
        },

        partner4_sq: {
          url: "https://www.minecraftexperience.com",
          alt: "Minecraft Experience Villager Rescue",
        },
      };

      // =========================================================
      // LOAD STAFF JSON
      // =========================================================

      fetch("staff.json")
        .then((res) => res.json())
        .then((staffList) => {
          const container = document.getElementById("signatures");

          container.innerHTML = "";

          staffList.forEach((person) => {
            // =====================================================
            // PARTNER LOGOS
            // =====================================================

            const partnersHTML = (person.partners || [])
              .map((partnerKey) => {
                const partner = partnerDefinitions[partnerKey];

                if (!partner || !images[partnerKey]) return "";

                return `
<td style="padding-right:6px;">

  <a
    href="${partner.url}"
    target="_blank"
    rel="noopener noreferrer"
    style="text-decoration:none;"
  >

    <img
      src="${images[partnerKey]}"
      alt="${partner.alt}"
      width="65"
      height="65"
      style="
        display:block;
        width:65px;
        height:65px;
        border:0;
        -ms-interpolation-mode:bicubic;
      "
    />

  </a>

</td>
`;
              })
              .join("");

            // =====================================================
            // SIGNATURE HTML
            // =====================================================

            const signature = `
              
<table
  cellpadding="0"
  cellspacing="0"
  border="0"
  width="600"
  style="
    width:600px;
    background-color:#ffffff;
    margin-bottom:24px;
    border-collapse:collapse;
    mso-table-lspace:0pt;
    mso-table-rspace:0pt;
    font-family:Arial,sans-serif;
  "
>

  <tr>

    <td
      valign="top"
      style="
        padding:20px;
        font-family:Arial,sans-serif;
        font-size:12px;
        line-height:16px;
        color:#000000;
      "
    >

      <!-- NAME -->
      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>
          <td
            style="
              font-size:18px;
              font-weight:bold;
              line-height:20px;
              color:#000000;
              padding-bottom:2px;
            "
          >
            ${person.name}

            ${
              person.pronouns
                ? `
              <span
                style="
                  font-style:italic;
                  font-weight:normal;
                  font-size:12px;
                  color:#666666;
                "
              >
                (${person.pronouns})
              </span>
            `
                : ""
            }

          </td>
        </tr>
      </table>

      <!-- TITLE -->
      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>
          <td
            style="
              font-size:11px;
              text-transform:uppercase;
              letter-spacing:0.5px;
              color:#444444;
              line-height:14px;
            "
          >
            ${person.title}
          </td>
        </tr>
      </table>

      <!-- COMPANY -->
      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>
          <td
            style="
              font-weight:bold;
              color:#000000;
              padding-bottom:4px;
            "
          >
            FKP Scorpio Entertainment Ltd
          </td>
        </tr>
      </table>

      <!-- EMAIL -->
      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>
          <td style="line-height:16px;">
            <strong>E:</strong>
            <a
              href="mailto:${person.email}"
              style="
                color:#004080;
                text-decoration:none;
              "
            >
              ${person.email}
            </a>
          </td>
        </tr>

        <tr>
          <td style="line-height:16px;">
            <strong>M:</strong> ${person.phone}
          </td>
        </tr>

        <tr>
          <td style="padding-bottom:10px; line-height:16px;">
            <strong>W:</strong>
            <a
              href="https://fkpscorpioentertainment.com/"
              style="
                color:#004080;
                text-decoration:none;
              "
            >
              fkpscorpioentertainment.com
            </a>
          </td>
        </tr>
      </table>

      <!-- DIVIDER -->
      <table
        width="350"
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>
          <td
            style="
              border-top:1px solid #cccccc;
              font-size:1px;
              line-height:1px;
              height:1px;
            "
          >
          </td>
        </tr>
      </table>
      <!-- MAIN LOGO -->
      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>
          <td">
            <img
              src="${images.logo_with_strapline}"
              alt="FKP Scorpio Entertainment Logo"
              width="275"
              height="50"
              style="
                display:block;
                width:275px;
                height:50px;
                border:0;
                -ms-interpolation-mode:bicubic;
              "
            />

          </td>
        </tr>
      </table>

      ${
        partnersHTML
          ? `
      
      <!-- DIVIDER -->
      <table
        width="350"
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>
          <td
            style="
              border-top:1px solid #cccccc;
              font-size:1px;
              line-height:1px;
              height:1px;
            "
          >
            &nbsp;
          </td>
        </tr>

        <tr>
          <td style="height:10px; line-height:10px; font-size:10px;">
            &nbsp;
          </td>
        </tr>
      </table>

      <!-- PARTNER LOGOS -->
      <table
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="
          border-collapse:collapse;
          mso-table-lspace:0pt;
          mso-table-rspace:0pt;
        "
      >
        <tr>

          ${partnersHTML}

        </tr>

        <tr>
          <td
            colspan="10"
            style="height:12px; line-height:12px; font-size:12px;"
          >
            &nbsp;
          </td>
        </tr>
      </table>

      `
          : ""
      }

     

    </td>

  </tr>

</table>
`;

            container.innerHTML += signature;
          });
        })
        .catch((err) => {
          console.error(err);

          document.getElementById("signatures").innerText =
            "Failed to load staff data.";
        });
    </script>
  </body>
</html>
```
